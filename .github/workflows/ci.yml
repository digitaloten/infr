name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Opt JS-based actions into Node 24 ahead of the GH default flip (June 2026)
  # to surface upstream incompatibility early. Mirrors the krypt / tikr baseline.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Linux-only: infr is a Vulkan-first engine. `glslc` (shaderc) compiles the
# compute shaders at build time; the GPU integration tests are #[ignore]'d
# (they need a real Vulkan device), so CI builds + runs the CPU test suite.
# ash loads Vulkan at runtime via dlopen, so no libvulkan is needed to build.

jobs:
  fmt:
    name: cargo fmt --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt
          cache: false
      - run: rustup update --no-self-update stable
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install glslc (shaderc)
        run: sudo apt-get update && sudo apt-get install -y glslc
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy
          cache: false
      - run: rustup update --no-self-update stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install glslc (shaderc)
        run: sudo apt-get update && sudo apt-get install -y glslc
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: false
      - run: rustup update --no-self-update stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest
      - run: cargo nextest run --workspace --locked
      - run: cargo test --doc --workspace --locked

  build:
    name: cargo build --release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install glslc (shaderc)
        run: sudo apt-get update && sudo apt-get install -y glslc
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: false
      - run: rustup update --no-self-update stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --workspace --locked
